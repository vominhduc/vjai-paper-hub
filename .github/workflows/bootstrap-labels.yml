name: "🏷️ Bootstrap Labels"

on:
  workflow_dispatch:

jobs:
  create-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create required labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: "nomination", color: "0075ca", description: "Paper nominated for a cycle" },
              { name: "cycle",      color: "e4e669", description: "Related to a reading cycle" },
              { name: "seed",       color: "d93f0b", description: "Seed paper suggested by organizers" },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
                console.log(`Created label: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  console.log(`Label already exists: ${label.name}`);
                } else {
                  throw e;
                }
              }
            }
