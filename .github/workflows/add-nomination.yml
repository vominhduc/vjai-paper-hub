name: "🗳️ Add Nomination to Cycle"

# Fires when an issue is labeled with "nomination" (template: 02-nominate-cycle.yml)
on:
  issues:
    types: [labeled]

jobs:
  add-nomination:
    if: github.event.label.name == 'nomination'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run add-nomination script
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: node scripts/add-nomination.js

      - name: Commit updated cycles.json
        run: |
          git config user.name "vjai-bot"
          git config user.email "bot@vjai.dev"
          git add data/cycles.json
          git diff --staged --quiet || git commit -m "🗳️ nominate: add paper from issue #${{ github.event.issue.number }}"
          git push

      - name: React with ballot on issue
        uses: actions/github-script@v7
        with:
          script: |
            // Add a 👀 reaction to acknowledge receipt
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              content: 'eyes'
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🗳️ Nomination Registered!\n\nThis paper has been added to the active cycle. **React with 👍 on this issue to vote for it!**\n\nVotes are synced every 6 hours. The paper with the most 👍 reactions will be selected for the Deep Dive session.`
            });

      - name: Trigger site rebuild
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
