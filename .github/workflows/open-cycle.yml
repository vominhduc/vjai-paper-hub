name: "📅 Open New Cycle"

on:
  issues:
    types: [labeled]

jobs:
  open-cycle:
    if: github.event.label.name == 'new-cycle'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run open-cycle script
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: node scripts/open-cycle.js

      - name: Commit updated cycles.json
        run: |
          git config user.name "vjai-bot"
          git config user.email "bot@vjai.dev"
          git add data/cycles.json
          git diff --staged --quiet || git commit -m "📅 cycle: open new cycle from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const cycles = JSON.parse(fs.readFileSync('data/cycles.json', 'utf8'));
            const newest = cycles[cycles.length - 1];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 📅 Cycle Opened!\n\n**${newest.id}** — ${newest.theme}\n\nNominations are now open! Share the [Nominate template](../../issues/new?template=02-nominate-cycle.yml) with the community. Remember to use Cycle ID \`${newest.id}\` in your nominations.`
            });

      - name: Trigger site rebuild
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
