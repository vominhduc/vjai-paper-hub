name: "🤖 Crawl Papers for Cycle"

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Crawl mode"
        required: true
        default: "topic"
        type: choice
        options:
          - topic
          - conference
          - arxiv
          - author
      cycle_id:
        description: "Target cycle ID (e.g. 2026-jun). Leave blank to add to seeds.json."
        required: false
        default: ""
        type: string
      topic:
        description: "[topic mode] Keywords to search (e.g. 'reasoning LLM 2025')"
        required: false
        default: ""
        type: string
      conference:
        description: "[conference mode] Conference name"
        required: false
        default: "ICLR"
        type: choice
        options:
          - ICLR
          - NeurIPS
          - ICML
          - CVPR
          - EMNLP
          - ACL
          - ECCV
          - ICCV
          - NAACL
      year:
        description: "[conference mode] Conference year (e.g. 2025)"
        required: false
        default: "2025"
        type: string
      arxiv_id:
        description: "[arxiv mode] arXiv ID or URL (e.g. 2106.09685 or https://arxiv.org/abs/2106.09685)"
        required: false
        default: ""
        type: string
      author:
        description: "[author mode] Researcher name (e.g. 'Andrej Karpathy') or Semantic Scholar author ID"
        required: false
        default: ""
        type: string
      limit:
        description: "Max number of papers to add (default 15, ignored in arxiv mode)"
        required: false
        default: "15"
        type: string
      min_citations:
        description: "[conference/author mode] Minimum citation count (default 0)"
        required: false
        default: "0"
        type: string

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run crawl-papers script
        id: crawl
        env:
          MODE:          ${{ github.event.inputs.mode }}
          CYCLE_ID:      ${{ github.event.inputs.cycle_id }}
          TOPIC:         ${{ github.event.inputs.topic }}
          CONFERENCE:    ${{ github.event.inputs.conference }}
          YEAR:          ${{ github.event.inputs.year }}
          ARXIV_ID:      ${{ github.event.inputs.arxiv_id }}
          AUTHOR:        ${{ github.event.inputs.author }}
          LIMIT:         ${{ github.event.inputs.limit }}
          MIN_CITATIONS: ${{ github.event.inputs.min_citations }}
        run: node scripts/crawl-papers.js

      - name: Commit updated data files
        run: |
          git config user.name "vjai-bot"
          git config user.email "bot@vjai.dev"
          git add data/seeds.json data/cycles.json
          git diff --staged --quiet && echo "⚠️  No new papers to commit." || {
            MODE="${{ github.event.inputs.mode }}"
            CYCLE="${{ github.event.inputs.cycle_id }}"
            COUNT="${{ steps.crawl.outputs.count }}"
            case "$MODE" in
              topic)      git commit -m "🤖 crawl [topic: ${{ github.event.inputs.topic }}] → ${CYCLE:-seeds} — ${COUNT} papers" ;;
              conference) git commit -m "🤖 crawl [${{ github.event.inputs.conference }} ${{ github.event.inputs.year }}] → ${CYCLE:-seeds} — ${COUNT} papers" ;;
              arxiv)      git commit -m "🤖 crawl [arXiv: ${{ github.event.inputs.arxiv_id }}] → ${CYCLE:-seeds}" ;;
              author)     git commit -m "🤖 crawl [author: ${{ github.event.inputs.author }}] → ${CYCLE:-seeds} — ${COUNT} papers" ;;
            esac
            git push
          }

      - name: Trigger site rebuild
        if: steps.crawl.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "deploy.yml",
              ref: "main"
            });

      - name: Print summary
        run: |
          echo "## 🤖 Crawl results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ github.event.inputs.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "**Cycle target:** ${{ github.event.inputs.cycle_id || 'seeds.json' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Papers added:** ${{ steps.crawl.outputs.count }}" >> $GITHUB_STEP_SUMMARY
