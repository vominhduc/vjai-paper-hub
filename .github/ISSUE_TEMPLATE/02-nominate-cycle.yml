name: "🗳️ Nominate Paper for Cycle"
description: "Nominate a paper you will present at the Exploration session. After all presentations, the community votes one paper into the Deep Dive."
title: "Nominate: [PAPER TITLE]"
labels: ["nomination", "cycle"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Nominate a Paper for the Exploration Session

        By submitting this form you are **committing to present this paper** at the upcoming Exploration session.
        Each nominator gives a short presentation of their paper; afterwards, the community votes with 👍 reactions
        to select one paper for the full Deep Dive session.

        > 💡 **Tip:** If you arrived here from the Seeds page, the Cycle ID and Paper URL are already pre-filled for you.

  - type: input
    id: nominator_name
    attributes:
      label: "Your Name / Handle"
      description: "How should we credit you as the presenter? (GitHub username, real name, or nickname)"
      placeholder: "e.g. @alice or Alice Nguyen"
    validations:
      required: true

  - type: input
    id: cycle_id
    attributes:
      label: "Cycle ID"
      description: "Pre-filled automatically when clicking Nominate from the website. Format: YYYY-mon"
      placeholder: "e.g. 2026-apr"
    validations:
      required: true

  - type: input
    id: paper_url
    attributes:
      label: "Paper URL"
      description: "Link to the paper — arXiv abstract, project page, blog post, or PDF. arXiv links are preferred for automatic metadata fetching."
      placeholder: "https://arxiv.org/abs/... or any other link"
    validations:
      required: true

  - type: input
    id: arxiv_id
    attributes:
      label: "arXiv ID (if Paper URL is not an arXiv link)"
      description: "Required when the Paper URL above is not an arXiv link. Leave blank if you already provided an arXiv URL."
      placeholder: "e.g. 2501.12948"
    validations:
      required: false

  - type: input
    id: tags
    attributes:
      label: "Tags"
      description: "Comma-separated topic tags"
      placeholder: "LLM, Reasoning, RL"
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: "Why should the group explore this paper?"
      description: "A short pitch — what makes this paper interesting enough to present at the Exploration session?"
      placeholder: "This paper is worth exploring because..."
    validations:
      required: true
