name: "📅 Open New Cycle"
description: "Create a new cycle. Adds it to cycles.json as active with nomination phase open."
title: "New Cycle: [CYCLE ID]"
labels: ["new-cycle", "cycle"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Open a New Nomination Cycle
        This creates a new entry in `cycles.json` with `status: active`.
        Share the issue link with the community to start collecting nominations.

  - type: input
    id: cycle_id
    attributes:
      label: "Cycle ID"
      description: "Format: YYYY-mmm, e.g. 2026-aug"
      placeholder: "2026-aug"
    validations:
      required: true

  - type: input
    id: month
    attributes:
      label: "Month"
      placeholder: "August"
    validations:
      required: true

  - type: input
    id: year
    attributes:
      label: "Year"
      placeholder: "2026"
    validations:
      required: true

  - type: input
    id: theme
    attributes:
      label: "Cycle Theme"
      description: "A short thematic label, e.g. 'Reasoning & Reinforcement Learning'"
      placeholder: "Efficient Inference & Serving"
    validations:
      required: true

  - type: input
    id: nomination_end
    attributes:
      label: "Nomination End Date (YYYY-MM-DD)"
      description: "Last day to submit nominations"
      placeholder: "2026-08-10"
    validations:
      required: false

  - type: input
    id: exploration_start
    attributes:
      label: "Exploration Session Date (YYYY-MM-DD)"
      description: "Date of the Exploration session (voting opens here)"
      placeholder: "2026-08-14"
    validations:
      required: false

  - type: input
    id: session_date
    attributes:
      label: "Deep Dive Session Date (YYYY-MM-DD, optional)"
      placeholder: "2026-08-28"
    validations:
      required: false

  - type: input
    id: presenter
    attributes:
      label: "Tentative Presenter (can be TBD)"
      placeholder: "TBD"
    validations:
      required: false

  - type: input
    id: presenter_role
    attributes:
      label: "Presenter Role"
      placeholder: "VJAI Community"
    validations:
      required: false
